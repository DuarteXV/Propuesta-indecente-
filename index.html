<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  overflow:hidden;
  font-family:Inter,sans-serif;
  color:#fff;
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
}

/* mensaje */
.msg{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.85);
  text-align:center;
  opacity:0;
  transition:.7s ease;
  max-width:300px;
}

.msg.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

h1{
  font-size:1.8rem;
  margin-bottom:12px;
  font-weight:800;
}

p{
  font-size:1rem;
  color:#bbb;
  line-height:1.6;
}

/* hint */
.tap{
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
  color:#666;
  font-size:.9rem;
  animation:blink 1.6s infinite;
}

@keyframes blink{
  50%{opacity:.3}
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="msg" id="msg">
  <h1>✨</h1>
  <p>
    Hay personas que simplemente aparecen…  
    y sin hacer mucho, hacen que todo se sienta distinto.
  </p>
</div>

<div class="tap" id="tap">Toca la pantalla</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let w,h;
function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let stars=[];
let waves=[];
let exploded=false;

// sonido suave
function sound(){
  const a=new (window.AudioContext||window.webkitAudioContext)();
  const o=a.createOscillator();
  const g=a.createGain();

  o.type="sine";
  o.frequency.value=200;

  o.connect(g);
  g.connect(a.destination);

  o.start();

  g.gain.setValueAtTime(0.2,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.2);

  o.stop(a.currentTime+1.2);
}

// explosión galaxia
function explode(x,y){
  for(let i=0;i<260;i++){
    stars.push({
      x,y,
      vx:(Math.random()-0.5)*9,
      vy:(Math.random()-0.5)*9,
      size:Math.random()*2+1,
      life:120,
      color:`hsl(${200+Math.random()*120},100%,70%)`
    });
  }

  waves.push({x,y,r:0,alpha:1});
}

// interacción
canvas.addEventListener("click",e=>{
  if(exploded) return;
  exploded=true;

  explode(e.clientX,e.clientY);
  sound();

  document.getElementById("tap").style.display="none";

  setTimeout(()=>{
    document.getElementById("msg").classList.add("show");
  },800);
});

// loop
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,w,h);

  // estrellas
  stars.forEach(s=>{
    s.x+=s.vx;
    s.y+=s.vy;
    s.life--;

    ctx.fillStyle=s.color;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  });

  stars=stars.filter(s=>s.life>0);

  // ondas
  waves.forEach(w=>{
    w.r+=4;
    w.alpha-=0.02;

    ctx.strokeStyle=`rgba(255,255,255,${w.alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(w.x,w.y,w.r,0,Math.PI*2);
    ctx.stroke();
  });

  waves=waves.filter(w=>w.alpha>0);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
