<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Indecente - Romeo Santos</title>
    <style>
        :root { --accent: #e94560; --bg: #050505; }
        body {
            margin: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }
        .glow {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 70%);
            z-index: -1; animation: move 12s infinite alternate;
        }
        @keyframes move { from { transform: translate(-30%, -10%); } to { transform: translate(30%, 10%); } }
        
        .container { text-align: center; width: 90%; max-width: 600px; z-index: 1; }
        .artist { color: var(--accent); letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 30px; }
        
        .lyrics-container {
            height: 300px; overflow: hidden; position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }
        #lyrics-wrapper { transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        .line {
            font-size: 1.3rem; padding: 15px 0; opacity: 0.15;
            transition: all 0.5s; filter: blur(1px);
        }
        .line.active {
            opacity: 1; filter: blur(0); transform: scale(1.1);
            color: var(--accent); text-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }
        
        audio {
            margin-top: 40px; width: 100%; max-width: 320px;
            filter: invert(1) hue-rotate(180deg); opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1 style="font-weight: 300;">Propuesta Indecente</h1>
        <p class="artist">ROMEO SANTOS</p>
        <div class="lyrics-container">
            <div id="lyrics-wrapper"></div>
        </div>
        <audio id="player" controls src="https://raw.githubusercontent.com/DuarteXV/Yotsuba-MD-Premium/main/uploads/daa2998f4bc2990e.mp3"></audio>
    </div>

    <script>
        const lyrics = [
            { t: 0, m: "♪ (Intro Bachata) ♪" },
            { t: 14, m: "Una aventura es más divertida" },
            { t: 17, m: "Si huele a peligro" },
            { t: 21, m: "Si te invito a una copa y me acerco a tu boca" },
            { t: 25, m: "Si te robo un suspiro" },
            { t: 29, m: "Pasamos la línea de la libertad" },
            { t: 33, m: "Alcanzar la locura otra vez si me dejas" },
            { t: 37, m: "Si te llevo a la gloria" },
            { t: 41, m: "No me culpes, la noche es la que incita" },
            { t: 45, m: "Si te falto el respeto y luego culpo al vino" },
            { t: 52, m: "Si te digo que yo por ti perdí el camino" },
            { t: 59, m: "Pa' qué despejar la duda, si es mejor vivir así" },
            { t: 65, m: "Una propuesta indecente" },
            { t: 71, m: "Acompáñame, dímelo Anthony" },
            { t: 84, m: "Y si te invito a una noche" },
            { t: 86, m: "Nos perseguimos, nos enredamos" },
            { t: 89, m: "Y en el juego nos buscamos" },
            { t: 92, m: "Si te parece prudente" },
            { t: 94, m: "Esta propuesta indecente" },
            { t: 98, m: "A ver, a ver, mucha atención" },
            { t: 115, m: "Me gustas, no lo niego" },
            { t: 119, m: "Pero no es para tanto" },
            { t: 122, m: "Lo tuyo es un deseo, lo mío es algo sano" },
            { t: 130, m: "Si te falto el respeto y luego culpo al vino" },
            { t: 137, m: "Si te digo que yo por ti perdí el camino" },
            { t: 145, m: "Una propuesta indecente..." },
            { t: 153, m: "♪ (Solo de Guitarra) ♪" },
            { t: 182, m: "Y si te invito a una noche" },
            { t: 184, m: "Nos perseguimos, nos enredamos" },
            { t: 187, m: "Y en el juego nos buscamos" },
            { t: 190, m: "Si te parece prudente" },
            { t: 192, m: "Esta propuesta indecente" },
            { t: 204, m: "I'm the King... you know" },
            { t: 215, m: "Si te falto el respeto y luego culpo al vino" },
            { t: 223, m: "Si te digo que yo por ti perdí el camino" },
            { t: 231, m: "Una propuesta indecente" },
            { t: 238, m: "It's a new style... so chill" },
            { t: 245, m: "♪ (Final) ♪" }
        ];

        const wrapper = document.getElementById('lyrics-wrapper');
        const player = document.getElementById('player');

        lyrics.forEach((line, i) => {
            const div = document.createElement('div');
            div.className = 'line';
            div.id = `line-${i}`;
            div.textContent = line.m;
            wrapper.appendChild(div);
        });

        player.addEventListener('timeupdate', () => {
            const time = player.currentTime;
            const index = lyrics.findLastIndex(l => time >= l.t);
            if (index !== -1) {
                document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
                const activeLine = document.getElementById(`line-${index}`);
                if (activeLine) {
                    activeLine.classList.add('active');
                    const offset = (300 / 2) - activeLine.offsetTop;
                    wrapper.style.transform = `translateY(${offset - 25}px)`;
                }
            }
        });
    </script>
</body>
  </html>
