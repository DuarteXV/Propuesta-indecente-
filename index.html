<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta Indecente — Romeo Santos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1DB954; --bg: #0d0d0d; --s2: #282828;
  --white: #FFFFFF; --gray: #A7A7A7; --gray2: #404040;
}
html, body { height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--white); overflow: hidden; }

.ambient {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 50% at 50% -5%, rgba(155,27,42,0.5) 0%, transparent 62%);
}
.app {
  position: relative; z-index: 1;
  width: 100%; max-width: 430px; height: 100vh;
  margin: 0 auto; display: flex; flex-direction: column; overflow: hidden;
}

/* Topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 24px 10px; flex-shrink: 0;
}
.topbar svg { cursor: pointer; opacity: .7; transition: opacity .2s; }
.topbar svg:hover { opacity: 1; }
.topbar-label { font-size: .68rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; }

/* Disc */
.disc-wrap { display: flex; justify-content: center; padding: 6px 0 14px; flex-shrink: 0; }
.disc-outer {
  width: 195px; height: 195px; border-radius: 50%; position: relative;
  filter: drop-shadow(0 10px 36px rgba(0,0,0,.8)) drop-shadow(0 0 28px rgba(155,27,42,.38));
}
.disc-vinyl {
  width: 100%; height: 100%; border-radius: 50%;
  background: conic-gradient(#1c1c1c 0deg,#252525 8deg,#111 18deg,#1e1e1e 30deg,#161616 50deg,#242424 65deg,#101010 85deg,#1c1c1c 110deg,#151515 140deg,#222 170deg,#111 200deg,#1d1d1d 230deg,#161616 260deg,#232323 290deg,#101010 320deg,#1c1c1c 360deg);
  position: absolute; inset: 0; border-radius: 50%;
  animation: spin 7s linear infinite paused;
}
.disc-vinyl.spinning { animation-play-state: running; }
.disc-vinyl::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: repeating-radial-gradient(circle at 50% 50%, transparent 24px,rgba(255,255,255,.022) 25px,transparent 27px,rgba(255,255,255,.016) 30px,transparent 31px,rgba(255,255,255,.022) 34px,transparent 35px);
}
@keyframes spin { to { transform: rotate(360deg); } }
.disc-label {
  position: absolute; inset: 15%; border-radius: 50%; overflow: hidden;
  background: linear-gradient(145deg,#9B1B2A 0%,#6B0F1A 55%,#3D0A10 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.disc-monogram { font-size: 1.9rem; font-weight: 800; color: rgba(255,255,255,.9); line-height: 1; }
.disc-sub { font-size: .37rem; letter-spacing: .26em; color: rgba(255,255,255,.45); text-transform: uppercase; }
.disc-hole {
  position: absolute; width: 13%; height: 13%; left: 43.5%; top: 43.5%;
  border-radius: 50%; background: radial-gradient(circle,#080808 60%,#181818 100%); z-index: 2;
}

/* Song info */
.song-info { display: flex; align-items: center; justify-content: space-between; padding: 0 24px 12px; flex-shrink: 0; }
.song-name { font-size: 1.15rem; font-weight: 700; }
.song-artist { font-size: .82rem; color: var(--gray); margin-top: 2px; }
.heart-btn { background: none; border: none; cursor: pointer; color: var(--green); transition: transform .15s; }
.heart-btn:hover { transform: scale(1.15); }

/* Progress */
.prog-wrap { padding: 0 24px; flex-shrink: 0; }
.prog-track { width: 100%; height: 4px; background: var(--gray2); border-radius: 2px; cursor: pointer; position: relative; }
.prog-fill {
  height: 100%; width: 0%; background: var(--white); border-radius: 2px;
  pointer-events: none; transition: width .22s linear; position: relative;
}
.prog-fill::after {
  content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 12px; border-radius: 50%; background: var(--white); opacity: 0; transition: opacity .15s;
}
.prog-track:hover .prog-fill { background: var(--green); }
.prog-track:hover .prog-fill::after { opacity: 1; }
.time-row { display: flex; justify-content: space-between; font-size: .63rem; color: var(--gray); margin-top: 6px; }

/* Controls */
.controls { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 10px; flex-shrink: 0; }
.c-side { background:none;border:none;cursor:pointer;color:var(--gray);padding:8px;transition:color .15s,transform .15s; }
.c-side:hover { color:var(--white);transform:scale(1.08); }
.c-skip { background:none;border:none;cursor:pointer;color:var(--white);padding:8px;opacity:.75;transition:opacity .15s,transform .15s; }
.c-skip:hover { opacity:1;transform:scale(1.08); }
.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--white); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color:#000;
  box-shadow: 0 6px 20px rgba(0,0,0,.5); transition: transform .15s,background .15s;
}
.play-btn:hover { transform: scale(1.06); background: #e8e8e8; }
.play-btn:active { transform: scale(.96); }

/* Lyrics panel */
.lyrics-panel { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.lyrics-panel::before,.lyrics-panel::after { content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none; }
.lyrics-panel::before { top:0;height:52px;background:linear-gradient(to bottom,var(--bg),transparent); }
.lyrics-panel::after  { bottom:0;height:72px;background:linear-gradient(to top,var(--bg),transparent); }

.lscroll {
  padding: 24px 28px 60px;
  transition: transform .5s cubic-bezier(.25,.46,.45,.94);
  will-change: transform;
}

.lyric-line {
  font-size: 1.4rem; font-weight: 800; line-height: 1.35; margin-bottom: 16px;
  color: rgba(255,255,255,.22); cursor: pointer; user-select: none;
  transition: color .38s, font-size .28s;
}
.lyric-line:hover { color: rgba(255,255,255,.4); }
.lyric-line.near-prev { color: rgba(255,255,255,.4); }
.lyric-line.near-next { color: rgba(255,255,255,.3); }
.lyric-line.active { font-size: 1.52rem; color: rgba(255,255,255,.25); }
.lyric-line.active .w { transition: color .16s; color: rgba(255,255,255,.25); }
.lyric-line.active .w.lit { color: var(--white); }
.lyric-line.meta {
  font-size: .7rem !important; font-weight: 500;
  color: rgba(255,255,255,.18) !important; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 22px;
}
.lyric-line.meta.active { color: rgba(255,255,255,.55) !important; font-size: .76rem !important; }

/* Volume */
.vol-row { display: flex; align-items: center; gap: 10px; padding: 4px 24px 26px; flex-shrink: 0; }
.vol-icon { color: var(--gray); flex-shrink: 0; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:4px; background:var(--gray2); border-radius:2px; cursor:pointer; outline:none;
}
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--white); }
input[type=range]:hover { background:#606060; }
</style>
</head>

<div class="app">

<audio id="audio" src="https://raw.githubusercontent.com/DuarteXV/Yotsuba-MD-Premium/main/uploads/daa2998f4bc2990e.mp3" preload="metadata"></audio>

<script>
// ── Letra completa con timestamps calibrados ─────────────────────────────────
const lyrics = [
  { t: 0,   m: "♪ Intro ♪",                                         meta: true  },
  { t: 6,   m: "Hola, me llaman Romeo"                                           },
  { t: 9,   m: "Es un placer conocerla"                                          },
  { t: 12,  m: "Qué bien te ves, te adelanto"                                    },
  { t: 15,  m: "No me importa quién sea él"                                      },
  { t: 18,  m: "Dígame usted, si ha hecho algo travieso alguna vez"              },
  { t: 22,  m: "Una aventura es más divertida si huele a peligro"               },
  { t: 27,  m: "Y si te invito a una copa y me acerco a tu boca"                },
  { t: 32,  m: "Si te robo un besito, a ver, te enojas conmigo"                 },
  { t: 37,  m: "Qué dirías si esta noche te seduzco en mi coche"                },
  { t: 42,  m: "Que se empañen los vidrios si la regla es que goces"            },
  { t: 47,  m: "Si te falto el respeto y luego culpo al alcohol"                },
  { t: 52,  m: "Si levanto tu falda, ¿me darías el derecho"                     },
  { t: 56,  m: "A medir tu sensatez, poner en juego tu cuerpo?"                 },
  { t: 60,  m: "Si te parece prudente esta propuesta indecente"                 },
  { t: 65,  m: "A ver, a ver"                                                    },
  { t: 67,  m: "Permíteme apreciar tu desnudez"                                 },
  { t: 71,  m: "Relájate"                                                        },
  { t: 73,  m: "Que este martini calmará tu timidez"                            },
  { t: 77,  m: "Una aventura es más divertida si huele a peligro"               },
  { t: 82,  m: "Y si te invito a una copa y me acerco a tu boca"                },
  { t: 87,  m: "Si te robo un besito, a ver, te enojas conmigo"                 },
  { t: 92,  m: "Qué dirías si esta noche te seduzco en mi coche"                },
  { t: 97,  m: "Que se empañen los vidrios si la regla es que goces"            },
  { t: 102, m: "Si te falto el respeto y luego culpo al alcohol"                },
  { t: 107, m: "Si levanto tu falda, ¿me darías el derecho"                     },
  { t: 111, m: "A medir tu sensatez, poner en juego tu cuerpo?"                 },
  { t: 115, m: "Si te parece prudente esta propuesta indecente"                 },
  { t: 120, m: "A ver, a ver"                                                    },
  { t: 122, m: "Permíteme apreciar tu desnudez"                                 },
  { t: 126, m: "Relájate"                                                        },
  { t: 128, m: "Que este martini calmará tu timidez"                            },
  { t: 132, m: "Una aventura es más divertida si huele a peligro"               },
  { t: 137, m: "♪ Solo de guitarra ♪",                              meta: true  },
  { t: 162, m: "I'm back...",                                        meta: true  },
  { t: 165, m: "It feels good to be king",                           meta: true  },
  { t: 168, m: "Hey... listen",                                      meta: true  },
  { t: 171, m: "I know what you like",                               meta: true  },
  { t: 175, m: "Y si te invito a una copa y me acerco a tu boca"                },
  { t: 180, m: "Si te robo un besito, a ver, te enojas conmigo"                 },
  { t: 185, m: "Qué dirías si esta noche te seduzco en mi coche"                },
  { t: 190, m: "Que se empañen los vidrios si la regla es que goces"            },
  { t: 195, m: "Si te falto el respeto y luego culpo al alcohol"                },
  { t: 200, m: "Si levanto tu falda, ¿me darías el derecho"                     },
  { t: 204, m: "A medir tu sensatez, poner en juego tu cuerpo?"                 },
  { t: 208, m: "Si te parece prudente esta propuesta indecente"                 },
  { t: 213, m: "A ver, a ver"                                                    },
  { t: 215, m: "Permíteme apreciar tu desnudez"                                 },
  { t: 219, m: "Relájate"                                                        },
  { t: 221, m: "Que este martini calmará tu timidez"                            },
  { t: 225, m: "Una aventura es más divertida si huele a peligro"               },
  { t: 230, m: "How about if you and I, me and you"                             },
  { t: 233, m: "Bailamos bachata"                                                },
  { t: 236, m: "Y luego you and I, me and you"                                  },
  { t: 239, m: "Terminamo' en la cama"                                           },
  { t: 242, m: "How about if you and I, me and you"                             },
  { t: 245, m: "Bailamos bachata, ay bailamos bachata"                           },
  { t: 249, m: "Y luego you and I, me and you"                                  },
  { t: 252, m: "Terminamos en la cama"                                           },
  { t: 256, m: "♪ Outro ♪",                                         meta: true  },
];

// ── DOM ──────────────────────────────────────────────────────────────────────
const audio   = document.getElementById('audio');
const disc    = document.getElementById('disc');
const lscroll = document.getElementById('lscroll');
const progTrack = document.getElementById('prog-track');
const progFill  = document.getElementById('prog-fill');
const tCur = document.getElementById('t-cur');
const tDur = document.getElementById('t-dur');
const btnPlay = document.getElementById('btn-play');
const iPlay   = document.getElementById('i-play');
const iPause  = document.getElementById('i-pause');
const panel   = document.querySelector('.lyrics-panel');

// ── Build lines ───────────────────────────────────────────────────────────────
const spacer = document.createElement('div');
spacer.style.height = '50px';
lscroll.appendChild(spacer);

const els = lyrics.map((l, i) => {
  const div = document.createElement('div');
  div.className = 'lyric-line' + (l.meta ? ' meta' : '');
  div.id = `L${i}`;
  if (!l.meta) {
    l.m.split(' ').forEach((word, wi, arr) => {
      const sp = document.createElement('span');
      sp.className = 'w';
      sp.textContent = word + (wi < arr.length - 1 ? ' ' : '');
      div.appendChild(sp);
    });
  } else {
    div.textContent = l.m;
  }
  div.addEventListener('click', () => {
    audio.currentTime = l.t;
    if (audio.paused) togglePlay();
  });
  lscroll.appendChild(div);
  return div;
});

// ── State ─────────────────────────────────────────────────────────────────────
let lastIdx = -1;

const fmt = s => {
  s = Math.floor(s || 0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
};

function highlightWords(idx, time) {
  if (lyrics[idx].meta) return;
  const words = els[idx].querySelectorAll('.w');
  if (!words.length) return;
  const tS = lyrics[idx].t;
  const tE = idx + 1 < lyrics.length ? lyrics[idx+1].t : tS + 4;
  const pct = Math.min(1, (time - tS) / Math.max(tE - tS, 0.5));
  const lit = Math.ceil(pct * words.length);
  words.forEach((w, i) => w.classList.toggle('lit', i < lit));
}

function updateLyrics(time) {
  let idx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (time >= lyrics[i].t) idx = i; else break;
  }
  if (idx >= 0) highlightWords(idx, time);
  if (idx === lastIdx) return;
  lastIdx = idx;

  els.forEach((el, i) => {
    el.classList.remove('active','near-prev','near-next');
    const d = i - idx;
    if (d === 0)       el.classList.add('active');
    else if (d === -1) el.classList.add('near-prev');
    else if (d === 1)  el.classList.add('near-next');
  });

  if (idx >= 0) {
    const pH = panel.clientHeight;
    const lTop = els[idx].offsetTop + spacer.offsetHeight;
    lscroll.style.transform = `translateY(${pH * 0.27 - lTop}px)`;
  }
}

// ── Audio events ──────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime, d = audio.duration || 260;
  updateLyrics(t);
  progFill.style.width = (t / d * 100) + '%';
  tCur.textContent = fmt(t);
});
audio.addEventListener('loadedmetadata', () => { tDur.textContent = fmt(audio.duration); });

function togglePlay() {
  if (audio.paused) {
    audio.play();
    iPlay.style.display = 'none'; iPause.style.display = '';
    disc.classList.add('spinning');
  } else {
    audio.pause();
    iPlay.style.display = ''; iPause.style.display = 'none';
    disc.classList.remove('spinning');
  }
}
btnPlay.addEventListener('click', togglePlay);
audio.addEventListener('ended', () => {
  iPlay.style.display = ''; iPause.style.display = 'none';
  disc.classList.remove('spinning');
});

progTrack.addEventListener('click', e => {
  const r = progTrack.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 260);
});

document.getElementById('vol').addEventListener('input', e => { audio.volume = +e.target.
