<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Minimal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#090909;
  font-family:Inter,sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTENEDOR */
.player{
  width:100%;
  max-width:380px;
  height:92vh;
  border-radius:24px;
  background:#111;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* HEADER */
.header{
  text-align:center;
}
.header h2{font-size:1rem}
.header p{font-size:.8rem;color:#888}

/* PROGRESS */
.progress{
  height:4px;
  background:#333;
  border-radius:2px;
  cursor:pointer;
  overflow:hidden;
}
.progress div{
  height:100%;
  width:0;
  background:#fff;
}

/* BOTÓN */
.controls{
  display:flex;
  justify-content:center;
}
.play{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#fff;
  font-size:18px;
  cursor:pointer;
}

/* LETRAS */
.lyrics{
  flex:1;
  overflow:hidden;
  position:relative;
}
.lines{
  transition:transform .5s cubic-bezier(.22,.61,.36,1);
}

.line{
  text-align:center;
  font-size:1.2rem;
  color:#555;
  margin:14px 0;
  transition:.25s;
}
.line.active{
  color:#fff;
  font-size:1.5rem;
}
</style>
</head>

<body>

<div class="player">

  <div class="header">
    <h2>Propuesta Indecente</h2>
    <p>Romeo Santos</p>
  </div>

  <div class="progress" id="progress">
    <div id="bar"></div>
  </div>

  <div class="controls">
    <button class="play" id="play">▶</button>
  </div>

  <div class="lyrics">
    <div class="lines" id="lines"></div>
  </div>

</div>

<audio id="audio" src="https://raw.githubusercontent.com/DuarteXV/Yotsuba-MD-Premium/main/uploads/daa2998f4bc2990e.mp3"></audio>

<script>
const lyrics=[
{t:0,m:"Intro"},
{t:6,m:"Hola me llaman Romeo"},
{t:9,m:"Es un placer conocerla"},
{t:12,m:"Que bien te ves"},
{t:16,m:"No me importa quien sea el"},
{t:20,m:"Una aventura es mas divertida"},
{t:24,m:"Si huele a peligro"},
{t:28,m:"Si te invito a una copa"},
{t:32,m:"Si te robo un besito"},
{t:36,m:"Que dirias esta noche"},
{t:40,m:"Si te seduzco en mi coche"},
{t:45,m:"Si te falto el respeto"},
{t:50,m:"Si levanto tu falda"},
{t:55,m:"Esta propuesta indecente"},
{t:60,m:"Permiteme apreciar"},
{t:65,m:"Relajate"},
{t:70,m:"Una aventura es mas divertida"},
{t:75,m:"Si te invito a una copa"},
{t:80,m:"Si te robo un besito"},
{t:85,m:"Que dirias esta noche"},
{t:90,m:"Si te seduzco en mi coche"},
{t:95,m:"Si te falto el respeto"},
{t:100,m:"Si levanto tu falda"},
{t:105,m:"Esta propuesta indecente"},
{t:110,m:"Permiteme apreciar"},
{t:115,m:"Relajate"},
{t:120,m:"Solo"},
{t:165,m:"I'm back"},
{t:170,m:"It feels good"},
{t:175,m:"Si te invito a una copa"},
{t:180,m:"Si te robo un besito"},
{t:185,m:"Que dirias esta noche"},
{t:190,m:"Si te seduzco en mi coche"},
{t:195,m:"Si te falto el respeto"},
{t:200,m:"Si levanto tu falda"},
{t:205,m:"Esta propuesta indecente"},
{t:210,m:"Permiteme apreciar"},
{t:215,m:"Relajate"},
{t:220,m:"Bailamos bachata"},
{t:225,m:"Terminamos en la cama"},
{t:230,m:"Outro"}
];

const audio=document.getElementById('audio');
const lines=document.getElementById('lines');
const bar=document.getElementById('bar');

let els=[],last=-1;

// construir letras
lyrics.forEach(l=>{
  let d=document.createElement('div');
  d.className='line';
  d.textContent=l.m;
  lines.appendChild(d);
  els.push(d);
});

// update
function update(){
  let t=audio.currentTime;

  let i=lyrics.findIndex((l,idx)=>{
    let n=lyrics[idx+1];
    return t>=l.t && (!n||t<n.t);
  });

  if(i!==-1 && i!==last){
    last=i;

    els.forEach((el,idx)=>{
      el.classList.toggle('active',idx===i);
    });

    let el=els[i];
    let offset=el.offsetTop - 200;
    lines.style.transform=`translateY(-${offset}px)`;
  }

  bar.style.width=(t/audio.duration*100)+"%";
}

audio.addEventListener('timeupdate',update);

// play
document.getElementById('play').onclick=()=>{
  audio.paused?audio.play():audio.pause();
};

// seek
document.getElementById('progress').onclick=e=>{
  let r=e.currentTarget.getBoundingClientRect();
  audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;
};
</script>

</body>
</html>
